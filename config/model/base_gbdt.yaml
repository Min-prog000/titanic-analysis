model:
  random_state: 0

parameters:
  case_id: 1
  learning_rate: 
    is_searched: true
    min: 1e-4
    max: 1e-1
    divide_num: 4
  n_estimators:
    is_searched: false
    min: 100
    max: 400
    step: 100
  max_depth:
    is_searched: true
    min: 5
    max: 8
  max_features:
    is_searched: true
    min: 7
    max: 10
  subsample:
    is_searched: false
    min: 0.1
    max: 1.0
    step: 0.1

grid_search:
  n_jobs: 2
  verbose: 10
